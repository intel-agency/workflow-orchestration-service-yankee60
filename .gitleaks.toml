title = "gitleaks config"

# AI-generated repos may contain credential-scrubber tests with fake secrets.
# Those placeholder patterns (e.g., sk-1234...) trigger generic-api-key.
# The AGENTS.md directive prohibits real-looking prefixes, but as a safety net
# we allowlist the specific known-fake value that earlier runs produced.

[allowlist]
  description = "Synthetic test-fixture secrets for scrub_secrets() tests"
  regexTarget = "match"
  regexes = [
    '''sk-1234567890abcdef''',
  ]
  paths = [
    '''tests/test_work_item\.py''',
  ]
